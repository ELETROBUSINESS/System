<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ELETRO SYSTEM</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="/assets/img/iconWeb.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --primary-color: #d60039;
            --secondary-color: #ff104f;
            --bg-color: #0b0e14;
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.08);
            --border-radius: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .screen1 {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .form-login {
            background: rgba(15, 20, 30, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-box {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.2rem;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--secondary-color);
            box-shadow: 0 0 15px rgba(255, 16, 79, 0.2);
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-box input:focus+.input-icon {
            color: var(--secondary-color);
        }

        .password-toggle-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.4rem;
            transition: color 0.3s;
            z-index: 5;
        }

        .password-toggle-icon:hover {
            color: white;
        }

        .btn_form {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }

        .btn_form:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 16, 79, 0.5);
        }

        .btn_form:active {
            transform: translateY(-1px);
        }

        .btn_form:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--secondary-color);
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .change-user {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .change-user:hover {
            color: var(--text-color);
            text-decoration: underline;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--secondary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1rem;
            min-height: 20px;
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        .remember-me input {
            accent-color: var(--secondary-color);
            width: 16px;
            height: 16px;
        }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>

    <div class="loading-overlay" id="global-loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 0.9rem; color: rgba(255,255,255,0.6)">Conectando ao ELETRO...</p>
    </div>

    <div class="screen1">
        <div class="form-login">
            <form id="login-form">
                <h2 class="section-title">ELETRO SYSTEM</h2>

                <!-- Passo 1: Usuário -->
                <div id="username-step">
                    <p style="text-align:center; color:rgba(255,255,255,0.5); margin-bottom:1.5rem; font-size:0.85rem;">
                        Identifique-se para começar</p>
                    <div class="input-box">
                        <input type="text" placeholder="Seu usuário" id="login-username" autocomplete="username"
                            required>
                        <i class="bx bxs-user-circle input-icon"></i>
                    </div>
                    <button class="btn_form" type="button" id="continue-btn">
                        <span>Continuar</span>
                        <i class='bx bx-right-arrow-alt'></i>
                    </button>
                </div>

                <!-- Passo 2: Senha -->
                <div id="password-step" class="hidden">
                    <div class="user-info">
                        <img src="" alt="Avatar" class="user-avatar" id="user-avatar">
                        <div class="user-details">
                            <span class="user-name" id="user-display-name">...</span>
                            <button type="button" class="change-user" id="change-user-btn">
                                <i class='bx bx-transfer'></i> Trocar usuário
                            </button>
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="password" id="login-password" placeholder="Sua senha"
                            autocomplete="current-password" maxlength="20" required>
                        <i class="bx bxs-lock-alt input-icon"></i>
                        <i class='bx bx-show password-toggle-icon' id="password-toggle"></i>
                    </div>

                    <label class="remember-me">
                        <input type="checkbox" id="remember-me" checked>
                        Lembrar de mim
                    </label>

                    <button class="btn_form" type="submit" id="submit-login-btn">
                        <span>Entrar</span>
                        <i class='bx bx-log-in-circle'></i>
                    </button>
                </div>

                <div class="error-msg" id="error-message"></div>

                <div
                    style="margin-top: 1.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem;">
                    <a href="/users/e-finance.html"
                        style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 5px; transition: color 0.3s;">
                        <i class='bx bxs-lock-alt'></i> Acesso Administrativo
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase 10 Modular SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVQ3tf6Qu4_9PajpJclZAJjVvRgB4ZE2I",
            authDomain: "super-app25.firebaseapp.com",
            projectId: "super-app25",
            storageBucket: "super-app25.firebasestorage.app",
            messagingSenderId: "810900166273",
            appId: "1:810900166273:web:24b8f055a68c9f0a6b5f80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const DOM = {
            loader: document.getElementById("global-loader"),
            form: document.getElementById("login-form"),
            stepUser: document.getElementById("username-step"),
            stepPass: document.getElementById("password-step"),
            inputUser: document.getElementById("login-username"),
            inputPass: document.getElementById("login-password"),
            btnContinue: document.getElementById("continue-btn"),
            btnLogin: document.getElementById("submit-login-btn"),
            displayAvatar: document.getElementById("user-avatar"),
            displayName: document.getElementById("user-display-name"),
            btnChange: document.getElementById("change-user-btn"),
            btnTogglePass: document.getElementById("password-toggle"),
            msgError: document.getElementById("error-message"),
            rememberMe: document.getElementById("remember-me")
        };

        const DASHBOARD_URL = "/users/app/conta.html";

        document.addEventListener("DOMContentLoaded", () => {
            // Check current auth
            onAuthStateChanged(auth, async (user) => {
                const cachedData = localStorage.getItem('user_cache');
                if (user && cachedData) {
                    window.location.href = DASHBOARD_URL;
                    return;
                }

                // Hide loader if not logged in
                setTimeout(() => {
                    DOM.loader.style.opacity = "0";
                    setTimeout(() => DOM.loader.style.display = "none", 500);
                }, 800);
            });

            initParticles();
        });

        // Step 1
        DOM.btnContinue.addEventListener("click", handleContinue);
        DOM.inputUser.addEventListener("keydown", (e) => { if (e.key === 'Enter') { e.preventDefault(); handleContinue(); } });

        function handleContinue() {
            const username = DOM.inputUser.value.trim();
            if (username.length < 2) {
                showError("Digite um usuário válido.");
                return;
            }
            showError("");

            const initial = username.charAt(0).toUpperCase();
            const avatarUrl = `https://placehold.co/150/d60039/FFFFFF?text=${initial}`;

            DOM.displayAvatar.src = avatarUrl;
            DOM.displayName.innerText = username;

            DOM.stepUser.classList.add("hidden");
            DOM.stepPass.classList.remove("hidden");
            setTimeout(() => DOM.inputPass.focus(), 100);
        }

        // Change user
        DOM.btnChange.addEventListener("click", () => {
            DOM.stepPass.classList.add("hidden");
            DOM.stepUser.classList.remove("hidden");
            DOM.inputPass.value = "";
            DOM.inputUser.focus();
        });

        // Toggle Password
        DOM.btnTogglePass.addEventListener("click", () => {
            const isPass = DOM.inputPass.type === 'password';
            DOM.inputPass.type = isPass ? 'text' : 'password';
            DOM.btnTogglePass.className = isPass ? 'bx bx-hide password-toggle-icon' : 'bx bx-show password-toggle-icon';
        });

        // Submit
        DOM.form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = DOM.inputUser.value.trim();
            const password = DOM.inputPass.value;

            if (!password) { showError("Digite sua senha."); return; }

            setLoading(true);
            const emailFake = `${username.toLowerCase()}@eletrosystem.com`;

            try {
                // Persistence
                const persistence = DOM.rememberMe.checked ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistence);

                // Sign In
                const userCredential = await signInWithEmailAndPassword(auth, emailFake, password);
                const uid = userCredential.user.uid;

                // Load Data
                const userDoc = await getDoc(doc(db, "users", uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();

                    const uiData = {
                        uid: uid,
                        name: data.nome || username,
                        role: data.funcao || 'Colaborador',
                        photoUrl: data.photoUrl || DOM.displayAvatar.src,
                        points: data.pontos || 0,
                        username: username.toLowerCase()
                    };

                    // Compatibility with app-core.js
                    localStorage.setItem('user_cache', JSON.stringify(uiData));

                    const SESSION_EXPIRY_MS = 24 * 60 * 60 * 1000; // 24h
                    const sessionToken = {
                        username: uiData.username,
                        uid: uid,
                        profilePic: uiData.photoUrl,
                        redirect: DASHBOARD_URL,
                        expires: new Date().getTime() + SESSION_EXPIRY_MS
                    };
                    localStorage.setItem('session_token', JSON.stringify(sessionToken));

                    window.location.href = DASHBOARD_URL;
                } else {
                    showError("Perfil não encontrado.");
                    setLoading(false);
                }
            } catch (error) {
                console.error("Login Error:", error);
                setLoading(false);
                if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    showError("Credenciais inválidas.");
                } else if (error.code === 'auth/too-many-requests') {
                    showError("Muitas tentativas. Aguarde.");
                } else {
                    showError("Erro ao acessar o sistema.");
                }
            }
        });

        function showError(msg) {
            DOM.msgError.innerText = msg;
            if (msg) {
                DOM.form.animate([
                    { transform: 'translateX(0)' }, { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' }, { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }

        function setLoading(state) {
            DOM.btnLogin.disabled = state;
            DOM.btnLogin.innerHTML = state
                ? "<div class='spinner' style='width:18px;height:18px;border-width:2px;'></div>"
                : "<span>Entrar</span><i class='bx bx-log-in-circle'></i>";
        }

        // Particle System
        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let particles = [];
                const setCanvasSize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                class Particle {
                    constructor(x, y, dX, dY, s, c) { this.x = x; this.y = y; this.dirX = dX; this.dirY = dY; this.size = s; this.color = c; }
                    draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill(); }
                    update() {
                        if (this.x > canvas.width || this.x < 0) this.dirX = -this.dirX;
                        if (this.y > canvas.height || this.y < 0) this.dirY = -this.dirY;
                        this.x += this.dirX; this.y += this.dirY; this.draw();
                    }
                }
                const init = () => {
                    particles = [];
                    const num = (canvas.width * canvas.height) / 10000;
                    for (let i = 0; i < num; i++) {
                        let s = Math.random() * 2 + 0.5, x = Math.random() * canvas.width, y = Math.random() * canvas.height, dX = Math.random() * 0.4 - 0.2, dY = Math.random() * 0.4 - 0.2;
                        particles.push(new Particle(x, y, dX, dY, s, 'rgba(255,255,255,0.2)'));
                    }
                };
                const animate = () => { requestAnimationFrame(animate); ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => p.update()); };
                setCanvasSize(); init(); animate();
                window.addEventListener('resize', () => { setCanvasSize(); init(); });
            }
        }
    </script>
</body>

</html>
