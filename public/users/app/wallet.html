<!DOCTYPE html>
<html lang="pt-br" data-view="mobile" data-minimized="false">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta | ELETRO</title>
    <link rel="icon" href="/assets/img/iconWeb.png">

    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>

    <!-- Firebase (Required for App Core) -->
    <!-- Firebase 10 via app-core.js module -->

    <!-- Estilos Unificados e Main -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/style26.css">

    <!-- Navbar Anti-Flash -->
    <script>
        (function () {
            const savedState = localStorage.getItem('acc_navbar');
            if (savedState !== null) {
                document.documentElement.setAttribute('data-minimized', savedState);
                if (savedState === 'true') {
                    document.documentElement.classList.add('sidebar-minimized-init');
                }
            }
        })();
    </script>
</head>

<body style="--marker-x: 50%; --marker-y: 50%;">

    <div id="app-container" class="dashboard-grid">

        <!-- Header Information (Matches conta.html style) -->
        <div class="info">
            <div class="photo-profile">
                <!-- Placeholder image, will be updated by script -->
                <img src="/assets/img/iconWeb.png" id="user-profile-img" style="object-fit: cover;">
                <div class="detals">
                    <h1 id="user-full-name">Olá, ...</h1>
                    <p id="user-role-display">Carregando...</p>
                </div>
            </div>

            <div class="balance">
                <p>Pontos</p>
                <div class="saldo">
                    <span id="user-points" class="">0,00</span>
                </div>
            </div>
        </div>

        <!-- Section 1: Próximo Pagamento -->
        <div class="px-4">
            <div class="finance-card p-6 bg-white shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gray-50 flex items-center justify-center text-gray-600">
                        <i class="fi fi-rr-user-salary text-2xl"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xs uppercase font-bold text-gray-400 tracking-wider">Próximo Pagamento</h3>
                        <div class="flex items-baseline justify-between gap-2">
                            <p id="user-next-payment-value" class="text-xl font-bold text-gray-800 mt-1 skeleton"
                                style="min-width: 100px;">R$ 0,00</p>
                            <div class="text-right">
                                <span
                                    class="text-[9px] font-bold text-gray-400 uppercase block tracking-widest">Previsão</span>
                                <span id="user-next-payment-date"
                                    class="text-[12px] font-bold text-gray-800 tracking-tight skeleton"
                                    style="min-width: 70px;">--/--/----</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 2: Transitions History (List) -->
        <div class="px-4 w-full max-w-[800px] mx-auto mb-20 mt-6">
            <h3 class="text-[10px] uppercase font-bold text-gray-400 tracking-widest mb-4 flex items-center gap-2">
                <i class='bx bx-history'></i> Lançamentos Recentes
            </h3>

            <div id="lancamentos-container" class="space-y-3">
                <!-- Skeleton Loading Rows -->
                <div
                    class="finance-card p-4 flex items-center justify-between w-full bg-white shadow-sm border border-gray-50 rounded-2xl mb-2">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full skeleton"></div>
                        <div class="space-y-2">
                            <div class="h-3 w-24 bg-gray-100 rounded skeleton"></div>
                            <div class="h-2 w-16 bg-gray-50 rounded skeleton"></div>
                        </div>
                    </div>
                    <div class="h-4 w-12 bg-gray-100 rounded skeleton"></div>
                </div>
                <div
                    class="finance-card p-4 flex items-center justify-between w-full bg-white shadow-sm border border-gray-50 rounded-2xl mb-2 opacity-60">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full skeleton"></div>
                        <div class="space-y-2">
                            <div class="h-3 w-20 bg-gray-100 rounded skeleton"></div>
                            <div class="h-2 w-12 bg-gray-50 rounded skeleton"></div>
                        </div>
                    </div>
                    <div class="h-4 w-10 bg-gray-100 rounded skeleton"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Navbar -->
    <div class="nav-container">
        <div class="nav-marker" id="nav-marker"></div>
        <div class="nav-bg"></div>
        <nav class="nav-overlay" id="nav-overlay">
            <div class="nav-header-toggle">
                <div class="btn-toggle-sidebar" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        id="toggle-icon" style="transition: transform 0.3s ease;">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </div>
            </div>

            <div class="nav-links-container">
                <div class="nav-item" onclick="navigateTo('conta.html')">
                    <div class="nav-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </div>
                    <span class="nav-label">Casa</span>
                </div>

                <div class="nav-item active" onclick="navigateTo('wallet.html')">
                    <div class="nav-icon">
                        <i class='bx bx-user-circle' style="font-size: 24px;"></i>
                    </div>
                    <span class="nav-label">Conta</span>
                </div>

                <div class="nav-item desktop-only-item" onclick="navigateTo('/pdv')">
                    <div class="nav-icon">
                        <i class='bx bx-cart-minus' style="font-size: 24px;"></i>
                    </div>
                    <span class="nav-label">PDV</span>
                </div>

                <div class="nav-item desktop-only-item" onclick="navigateTo('quest.html')">
                    <div class="nav-icon">
                        <i class='bx bx-radar' style="font-size: 24px;"></i>
                    </div>
                    <span class="nav-label">Missão</span>
                </div>

                <div class="nav-item" onclick="navigateTo('extrato.html')">
                    <div class="nav-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <line x1="10" y1="9" x2="8" y2="9"></line>
                        </svg>
                    </div>
                    <span class="nav-label">Extrato</span>
                </div>

                <div class="nav-item" onclick="logoutApp()">
                    <div class="nav-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </div>
                    <span class="nav-label">Sair</span>
                </div>
            </div>
        </nav>
    </div>

    <script type="module" src="js/app-core.js"></script>
    <script src="/assets/js/script26.js"></script>
</body>
</body>

</html>
