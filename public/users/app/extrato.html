<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrato | ELETRO</title>
    <link rel="icon" href="/assets/img/iconWeb.png">

    <!-- Bibliotecas Externas (Tailwind Added) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/style26.css">

    <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>

    <!-- Firebase 10 via app-core.js module -->

    <style>
        /* Loading Suave */
        body.loading-auth .main-content,
        body.loading-auth .navigation {
            opacity: 0;
            pointer-events: none;
        }

        .skeleton {
            color: transparent;
            background: #ccc;
            border-radius: 4px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        /* Loader Interno */
        .loader-internal {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .spinner-internal {
            width: 30px;
            height: 30px;
            border: 3px solid #eee;
            border-top-color: #db0038;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="loading-auth" style="--marker-x: 50%; --marker-y: 50%;">

    <div id="app-container" class="dashboard-grid">

        <!-- Info Block (Adapted for Dynamic Data) -->
        <!-- Standard Header (Matched to conta.html) -->
        <div class="info">
            <div class="photo-profile">
                <!-- Dynamic Data from app-core.js -->
                <img src="/assets/img/iconWeb.png" id="user-profile-img" style="object-fit: cover;">
                <div class="detals">
                    <!-- IDs matched to app-core.js -->
                    <h1 id="user-full-name">Olá, ...</h1>
                    <p id="user-role-display">Carregando...</p>
                </div>
            </div>

            <div class="balance">
                <p>Pontos</p>
                <div class="saldo">
                    <span id="user-points" class="">0,00</span>
                </div>
                <div class="pending">
                    <!-- Reuse 'valor2' strictly for displaying ticket or keep 'kpi-ticket' if we want standard consistency -->
                    <p>Ticket-Médio: </p>
                    <span id="kpi-ticket" class="">R$ 0,00</span>
                </div>
            </div>
        </div>

        <div style="grid-column: 1 / -1;">

            <!-- Resumo de Totais -->
            <!-- Totals Removed -->

            <!-- Lista de Movimentações -->
            <div class="finance-card">
                <div class="period-badge">Histórico Completo</div>
                <div id="app-extract-list" class="p-4 space-y-3">
                    <!-- Skeleton Loading Rows -->
                    <div
                        class="finance-card p-4 flex items-center justify-between w-full bg-white shadow-sm border border-gray-50 rounded-2xl mb-2">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full skeleton"></div>
                            <div class="space-y-2">
                                <div class="h-3 w-24 bg-gray-100 rounded skeleton"></div>
                                <div class="h-2 w-16 bg-gray-50 rounded skeleton"></div>
                            </div>
                        </div>
                        <div class="h-4 w-12 bg-gray-100 rounded skeleton"></div>
                    </div>
                    <div
                        class="finance-card p-4 flex items-center justify-between w-full bg-white shadow-sm border border-gray-50 rounded-2xl mb-2 opacity-60">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full skeleton"></div>
                            <div class="space-y-2">
                                <div class="h-3 w-20 bg-gray-100 rounded skeleton"></div>
                                <div class="h-2 w-12 bg-gray-50 rounded skeleton"></div>
                            </div>
                        </div>
                        <div class="h-4 w-10 bg-gray-100 rounded skeleton"></div>
                    </div>
                </div>
                <!-- Load More Button -->
                <div class="p-4 text-center">
                    <button id="load-more"
                        class="text-xs font-bold text-gray-500 uppercase tracking-wide border px-4 py-2 rounded hover:bg-gray-50 transition hidden"
                        onclick="loadExtractMore()">
                        Carregar mais
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Navbar -->
    <div class="nav-container">

                </div>

                <div class="nav-item active" onclick="navigateTo('extrato.html')">
                    <div class="nav-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
